name: Deploy Website to AWS (SSH)

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website-ssh.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_PRIVATE_KEY }}" > ~/.ssh/hariharibol.pem
          chmod 600 ~/.ssh/hariharibol.pem
          ssh-keyscan -H ec2-13-206-188-46.ap-south-1.compute.amazonaws.com >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build and push website
        run: |
          cat > /tmp/deploy.sh << 'DEPLOY_EOF'
          #!/bin/bash
          set -e

          echo "📦 Deploying Hariharibol Website"
          echo "================================"

          # Variables
          REPO_URL="https://github.com/YOUR_USERNAME/hariharibol.git"
          APP_DIR="/opt/hariharibol"
          WEBSITE_DIR="$APP_DIR/website"

          # Clone or update repository
          if [ -d "$APP_DIR" ]; then
            echo "📂 Updating existing repository..."
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/main
          else
            echo "📥 Cloning repository..."
            sudo mkdir -p /opt
            sudo git clone $REPO_URL $APP_DIR
            sudo chown -R ubuntu:ubuntu $APP_DIR
          fi

          cd $WEBSITE_DIR

          # Install dependencies
          echo "📚 Installing dependencies..."
          npm ci --legacy-peer-deps

          # Build application
          echo "🔨 Building application..."
          npm run build

          # Stop old container (if exists)
          echo "🛑 Stopping old container..."
          sudo docker stop hariharibol-web || true
          sudo docker rm hariharibol-web || true

          # Build new Docker image
          echo "🐳 Building Docker image..."
          sudo docker build -t hariharibol-website:latest .

          # Run new container
          echo "🚀 Starting new container..."
          sudo docker run -d \
            --name hariharibol-web \
            --restart always \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e NEXT_TELEMETRY_DISABLED=1 \
            hariharibol-website:latest

          # Wait for health check
          echo "⏳ Waiting for container to be healthy..."
          sleep 10

          # Verify deployment
          echo "✅ Verifying deployment..."
          if docker ps | grep -q hariharibol-web; then
            echo "✓ Container is running"
          else
            echo "✗ Container failed to start"
            exit 1
          fi

          # Test endpoint
          if curl -s http://localhost:3000/home | grep -q "Hariharibol"; then
            echo "✓ Website is responding"
          else
            echo "⚠ Website responding but content check inconclusive"
          fi

          echo ""
          echo "================================"
          echo "✨ Deployment completed successfully!"
          echo "================================"
          echo ""
          echo "Website URL: http://ec2-13-206-188-46.ap-south-1.compute.amazonaws.com:3000"
          echo "Container: hariharibol-web"
          echo "Status: $(docker ps | grep hariharibol-web | awk '{print $NF}')"
          DEPLOY_EOF

          chmod +x /tmp/deploy.sh

          # Execute deployment script on AWS
          ssh -i ~/.ssh/hariharibol.pem -o StrictHostKeyChecking=no ubuntu@ec2-13-206-188-46.ap-south-1.compute.amazonaws.com 'bash -s' < /tmp/deploy.sh

      - name: Health check
        run: |
          echo "🔍 Running health checks..."
          for i in {1..5}; do
            if curl -s -f http://ec2-13-206-188-46.ap-south-1.compute.amazonaws.com:3000/home > /dev/null; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i/5: Waiting for server..."
            sleep 5
          done
          echo "⚠ Health check timeout (server might still be initializing)"

      - name: Deployment notification
        if: success()
        run: |
          echo "## ✨ Deployment Successful"
          echo ""
          echo "| Property | Value |"
          echo "|----------|-------|"
          echo "| Website | http://ec2-13-206-188-46.ap-south-1.compute.amazonaws.com:3000 |"
          echo "| Container | hariharibol-web |"
          echo "| Status | Running |"
          echo "| Branch | ${{ github.ref }} |"
          echo "| Commit | ${{ github.sha }} |"
          echo "| Author | ${{ github.actor }} |"
          echo "| Timestamp | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |"

      - name: Deployment failed notification
        if: failure()
        run: |
          echo "## ❌ Deployment Failed"
          echo ""
          echo "Please check the logs above for details."
          exit 1
