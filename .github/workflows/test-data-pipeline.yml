name: Test — Data Pipeline S3 Connectivity

on:
  workflow_dispatch: # manual trigger only

jobs:
  test-pipeline:
    name: Test S3 + Source Data Fetch
    runs-on: ubuntu-latest
    timeout-minutes: 5  # hard cap — well within budget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install aws-sdk
        run: npm install aws-sdk node-fetch@2
        working-directory: /tmp

      - name: Run test job
        working-directory: /tmp
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          node -e "
          const https = require('https');
          const AWS = require('aws-sdk');

          const s3 = new AWS.S3({
            accessKeyId: process.env.AWS_ACCESS_KEY_ID,
            secretAccessKey: process.env.AWS_SECRET_ACCESS_KEY,
            region: process.env.S3_REGION || 'ap-south-1',
          });

          const BUCKET = process.env.S3_BUCKET;
          const APPROVED_TRANSLATORS = [
            'prabhupada','shankaracharya','ramanujacharya','madhavacharya',
            'vallabhacharya','sridhara-swami','sivananda','dnyaneshwar',
            'ramsukhdas','tejomayananda','chinmayananda','eknath-maharaj','vinoba-bhave'
          ];

          function fetchJson(url) {
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                if (res.statusCode !== 200) { reject(new Error('HTTP ' + res.statusCode + ' — ' + url)); return; }
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(new Error('JSON parse failed: ' + e.message)); }
                });
              }).on('error', reject);
            });
          }

          async function run() {
            const startTime = Date.now();
            const issues = [];
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const s3Key = 'test/jobs/bg-source-test-' + timestamp + '.json';

            // Step 1 — Fetch BG 1.1
            console.log('Step 1: Fetching BG 1.1 from vedicscriptures...');
            let verseData;
            try {
              verseData = await fetchJson('https://raw.githubusercontent.com/vedicscriptures/bhagavad-gita/main/slok/bhagavadgita_chapter_1_slok_1.json');
              console.log('  OK — chapter:', verseData.chapter, 'verse:', verseData.verse);
            } catch(e) { console.error('FAIL Step 1:', e.message); process.exit(1); }

            // Step 2 — Fetch chapter meta
            console.log('Step 2: Fetching Chapter 1 metadata...');
            let chapterData;
            try {
              chapterData = await fetchJson('https://raw.githubusercontent.com/vedicscriptures/bhagavad-gita/main/chapter/bhagavadgita_chapter_1.json');
              console.log('  OK — chapter:', chapterData.chapter_number, 'verses:', chapterData.verses_count, 'name:', chapterData.name);
            } catch(e) { console.error('FAIL Step 2:', e.message); process.exit(1); }

            // Step 3 — Build payload
            console.log('Step 3: Building JSON payload...');
            const prabhupadaText = verseData.prabhu?.et || '';
            const sivanandaText  = verseData.siva?.et  || '';
            const commentaryText = prabhupadaText || sivanandaText;
            const translatorSlug = prabhupadaText ? 'prabhupada' : 'sivananda';

            const payload = {
              testJob: 's3-connectivity-and-source-test',
              timestamp: new Date().toISOString(),
              bookNumber: 1,
              bookSlug: 'bhagavat-gita',
              language: 'sa',
              chapterMeta: {
                chapterNumber: chapterData.chapter_number,
                chapterName: chapterData.name,
                totalVerses: chapterData.verses_count,
              },
              sampleVerse: {
                verseId: '1.1.1',
                globalVerseNumber: 1,
                bookNumber: 1,
                chapterNumber: verseData.chapter,
                verseNumber: verseData.verse,
                cantoNumber: null,
                speaker: verseData.speaker || 'धृतराष्ट्र',
                sanskrit: verseData.slok || '',
                transliteration: verseData.transliteration || '',
                wordMeanings: [],
                commentaries: commentaryText ? [{
                  translatorSlug,
                  type: 'translation',
                  language: 'en',
                  text: commentaryText,
                }] : [],
              },
              validation: {},
              status: 'PASS',
            };

            // Step 4 — Validate
            console.log('Step 4: Validating payload...');
            const v = payload.sampleVerse;
            if (!v.sanskrit?.trim())         issues.push('sanskrit is empty');
            if (!v.transliteration?.trim())  issues.push('transliteration is empty');
            if (v.verseId !== '1.1.1')       issues.push('verseId format wrong: ' + v.verseId);
            if (!v.commentaries?.length)     issues.push('no commentaries present');
            v.commentaries.forEach(c => {
              if (!c.text?.trim())                                   issues.push('commentary text empty for ' + c.translatorSlug);
              if (!APPROVED_TRANSLATORS.includes(c.translatorSlug)) issues.push('unapproved translator: ' + c.translatorSlug);
            });

            payload.validation = {
              sourceDataFetched:       true,
              chapterMetaFetched:      true,
              verseComplete:           !!(v.sanskrit && v.transliteration),
              sanskritNonEmpty:        !!v.sanskrit,
              transliterationNonEmpty: !!v.transliteration,
              commentaryPresent:       v.commentaries.length > 0,
            };

            if (issues.length > 0) {
              payload.status = 'FAIL';
              payload.issues = issues;
              console.log('  VALIDATION FAIL:', issues);
            } else {
              console.log('  Validation PASS — all rules satisfied');
            }

            // Step 5 — Upload to S3
            console.log('Step 5: Uploading to S3 —', s3Key);
            let etag;
            try {
              const result = await s3.putObject({
                Bucket: BUCKET,
                Key: s3Key,
                Body: JSON.stringify(payload, null, 2),
                ContentType: 'application/json',
              }).promise();
              etag = result.ETag;
              console.log('  Upload OK — ETag:', etag);
            } catch(e) { console.error('FAIL Step 5 S3 upload:', e.message); process.exit(1); }

            // Step 6 — Verify
            console.log('Step 6: Verifying upload with headObject...');
            try {
              const head = await s3.headObject({ Bucket: BUCKET, Key: s3Key }).promise();
              console.log('  Verify OK — ContentLength:', head.ContentLength, 'bytes');
            } catch(e) { console.error('FAIL Step 6 S3 verify:', e.message); process.exit(1); }

            const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);

            // Step 7 — Report
            console.log('');
            console.log('=== HariHariBol Test Job Result ===');
            console.log('Status:             ', payload.status);
            console.log('Source data fetched: YES — vedicscriptures BG 1.1');
            console.log('Chapter meta:        YES —', chapterData.verses_count, 'verses,', chapterData.name);
            console.log('Sanskrit:           ', v.sanskrit.substring(0, 60) + '...');
            console.log('Transliteration:    ', v.transliteration.substring(0, 60) + '...');
            console.log('Commentaries:       ', v.commentaries.length + ' (' + translatorSlug + ')');
            console.log('Validation:         ', issues.length === 0 ? 'PASS' : 'FAIL');
            console.log('S3 upload:           YES — key:', s3Key);
            console.log('S3 verify:           YES');
            console.log('Elapsed:            ', elapsed + 's');
            console.log('Issues:             ', issues.length === 0 ? 'none' : issues.join(', '));
            console.log('===================================');

            if (payload.status !== 'PASS') process.exit(1);
          }

          run().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
          "

      - name: Upload validation report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-pipeline-report-${{ github.run_number }}
          path: /tmp/report.json
          if-no-files-found: ignore
          retention-days: 7
