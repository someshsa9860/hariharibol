document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ink:#1A1410; --ink-soft:#3D342B; --ink-mute:#7A6E60; --ink-faint:#B8AC9C;\n    --hairline:rgba(26,20,16,0.08); --hairline-2:rgba(26,20,16,0.04);\n    --paper:#FBF7EF; --paper-warm:#F4ECDD; --card:#FFFFFF; --card-soft:#FCF8F0;\n    --saffron:#C75A1A; --saffron-deep:#9F4314; --saffron-soft:#F4DCC4;\n    --krishna:#1F3A6B; --krishna-soft:#DCE3F0; --gold:#A37A2C;\n    --serif:'Cormorant Garamond',Georgia,serif;\n    --sans:'Inter',-apple-system,system-ui,sans-serif;\n    --deva:'Noto Serif Devanagari',serif;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  body{overflow-x:hidden}\n  a{color:inherit;text-decoration:none}\n  ::selection{background:var(--saffron-soft);color:var(--ink)}\n\n  /* ────────── Type ────────── */\n  .eyebrow{font-size:11px;letter-spacing:2.2px;text-transform:uppercase;color:var(--saffron-deep);font-weight:600}\n  .h1{font-family:var(--serif);font-weight:500;font-size:clamp(48px,7.5vw,108px);line-height:0.98;letter-spacing:-0.5px;color:var(--ink);text-wrap:balance}\n  .h1 em{font-style:italic;color:var(--saffron-deep)}\n  .h2{font-family:var(--serif);font-weight:500;font-size:clamp(34px,4.5vw,60px);line-height:1.05;letter-spacing:-0.2px;color:var(--ink);text-wrap:balance}\n  .h3{font-family:var(--serif);font-weight:500;font-size:clamp(22px,2.4vw,30px);line-height:1.15;color:var(--ink)}\n  .lead{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(18px,2vw,22px);line-height:1.5;color:var(--ink-soft);text-wrap:pretty}\n  .meta{font-size:13px;letter-spacing:0.2px;color:var(--ink-mute)}\n  .micro{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-mute);font-weight:600}\n\n  /* ────────── Nav ────────── */\n  .nav{position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);background:rgba(251,247,239,0.65);border-bottom:0.5px solid var(--hairline-2)}\n  .nav-inner{max-width:1280px;margin:0 auto;padding:18px 32px;display:flex;align-items:center;justify-content:space-between}\n  .logo{display:flex;align-items:center;gap:10px}\n  .logo-mark{width:28px;height:28px}\n  .logo-name{font-family:var(--serif);font-size:20px;font-weight:600;letter-spacing:0.3px;color:var(--ink)}\n  .nav-links{display:flex;gap:36px;align-items:center}\n  .nav-links a{font-size:14px;color:var(--ink-soft);font-weight:500;transition:color .15s}\n  .nav-links a:hover{color:var(--saffron-deep)}\n  .nav-cta{padding:9px 18px;border-radius:999px;background:var(--ink);color:var(--paper)!important;font-size:13px;font-weight:600;letter-spacing:0.2px}\n  @media (max-width:780px){.nav-links a:not(.nav-cta){display:none}}\n\n  /* ────────── Hero ────────── */\n  .hero{position:relative;padding:140px 32px 80px;max-width:1280px;margin:0 auto;overflow:hidden}\n  .hero-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:80px;align-items:center;min-height:78vh}\n  .hero-text .eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:28px}\n  .hero-text .eyebrow::before{content:'';width:24px;height:1px;background:currentColor;opacity:.5}\n  .hero-text .h1{margin:0 0 26px}\n  .hero-text .lead{margin:0 0 40px;max-width:520px}\n  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;align-items:center}\n  .btn-primary{display:inline-flex;align-items:center;gap:10px;padding:16px 22px;border-radius:14px;background:var(--ink);color:var(--paper);font-size:15px;font-weight:600;letter-spacing:0.2px;transition:transform .15s,box-shadow .15s}\n  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,20,16,0.18)}\n  .btn-quiet{display:inline-flex;align-items:center;gap:8px;padding:16px 18px;color:var(--ink-soft);font-size:14px;font-weight:500}\n  .btn-quiet:hover{color:var(--saffron-deep)}\n  .hero-meta{margin-top:40px;display:flex;gap:32px;align-items:center;color:var(--ink-mute);font-size:13px}\n  .hero-meta strong{color:var(--ink);font-family:var(--serif);font-size:18px;font-weight:500}\n\n  /* breathing lotus bg */\n  .hero-bg{position:absolute;top:-10%;right:-15%;width:60vw;height:60vw;max-width:900px;max-height:900px;z-index:0;opacity:.5;pointer-events:none}\n  .hero-bg svg{width:100%;height:100%}\n  .breath{transform-origin:center;animation:breath 7s ease-in-out infinite}\n  @keyframes breath{0%,100%{transform:scale(0.95);opacity:.55}50%{transform:scale(1.04);opacity:.85}}\n\n  /* phone */\n  .hero-phone{position:relative;display:flex;justify-content:center;align-items:center}\n  .phone{position:relative;width:300px;height:614px;border-radius:46px;background:#0a0805;padding:8px;box-shadow:0 50px 90px rgba(26,20,16,0.2),0 0 0 1px rgba(26,20,16,0.08),inset 0 0 0 1px rgba(255,255,255,0.06)}\n  .phone-screen{width:100%;height:100%;border-radius:38px;overflow:hidden;background:var(--paper);position:relative}\n  .phone-island{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:96px;height:28px;border-radius:14px;background:#000;z-index:5}\n  .phone-status{position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:14px;font-weight:600;z-index:4}\n  .phone-status .right{display:flex;gap:5px;align-items:center}\n  .phone-status svg{display:block}\n\n  .phone-screen-inner{padding:60px 20px 0;height:100%;position:relative}\n  .ps-greet{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}\n  .ps-greet-time{font-size:11px;color:var(--ink-mute)}\n  .ps-greet-name{font-family:var(--serif);font-size:21px;font-weight:500;margin-top:2px}\n  .ps-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--saffron),var(--krishna));display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-size:14px}\n  .ps-card{padding:18px 16px;border-radius:18px;background:var(--card);border:0.5px solid var(--hairline);position:relative;overflow:hidden}\n  .ps-card-eb{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--saffron-deep);font-weight:600}\n  .ps-card-sa{font-family:var(--deva);font-size:17px;line-height:1.4;color:var(--ink);margin-top:12px;font-weight:500}\n  .ps-card-tr{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--ink-mute);margin-top:8px;line-height:1.4}\n  .ps-card-en{font-family:var(--serif);font-size:14px;font-weight:500;color:var(--ink-soft);margin-top:8px;line-height:1.35}\n  .ps-card-foot{margin-top:12px;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--ink-mute)}\n\n  .ps-tabs{position:absolute;bottom:0;left:0;right:0;padding:8px 16px 18px;display:flex;justify-content:space-around;background:rgba(251,247,239,0.85);backdrop-filter:blur(20px);border-top:0.5px solid var(--hairline);border-radius:0 0 38px 38px}\n  .ps-tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:500;color:var(--ink-mute);letter-spacing:0.2px}\n  .ps-tab.active{color:var(--saffron)}\n  .ps-tab svg{width:18px;height:18px}\n\n  @media (max-width:980px){\n    .hero{padding:120px 24px 60px}\n    .hero-grid{grid-template-columns:1fr;gap:50px;text-align:center;min-height:auto}\n    .hero-text .eyebrow{justify-content:center}\n    .hero-text .eyebrow::before{display:none}\n    .hero-ctas{justify-content:center}\n    .hero-meta{justify-content:center;flex-wrap:wrap}\n  }\n\n  /* ────────── Section: Daily verse ────────── */\n  .section{padding:120px 32px;max-width:1280px;margin:0 auto;position:relative}\n  .section.tight{padding:80px 32px}\n  .verse-row{display:grid;grid-template-columns:1fr 1.4fr;gap:80px;align-items:center}\n  .verse-card{padding:60px 60px;border-radius:32px;background:linear-gradient(180deg,#F4ECDD 0%,#FBF7EF 100%);border:0.5px solid var(--hairline);position:relative;overflow:hidden}\n  .verse-card .ornament{position:absolute;top:-40px;right:-40px;width:240px;height:240px;opacity:.18}\n  .verse-card .sa{font-family:var(--deva);font-size:clamp(28px,3.2vw,40px);line-height:1.5;font-weight:500;color:var(--ink);position:relative}\n  .verse-card .tr{margin-top:24px;font-family:var(--serif);font-style:italic;font-size:18px;color:var(--ink-mute);line-height:1.5;position:relative}\n  .verse-card .en{margin-top:24px;font-family:var(--serif);font-size:24px;font-weight:500;color:var(--ink-soft);line-height:1.4;position:relative;text-wrap:balance}\n  .verse-card .source{margin-top:32px;display:flex;align-items:center;justify-content:space-between;position:relative}\n  .verse-card .source .where{font-size:13px;letter-spacing:0.3px;color:var(--ink-mute)}\n  .verse-card .source .listen{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:var(--saffron);color:#fff;font-size:12px;font-weight:600;letter-spacing:0.3px}\n\n  @media (max-width:980px){\n    .section{padding:80px 24px}\n    .verse-row{grid-template-columns:1fr;gap:40px}\n    .verse-card{padding:40px 32px}\n  }\n\n  /* ────────── Three pillars ────────── */\n  .pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:64px}\n  .pillar{padding:40px 0 0;border-top:1px solid var(--hairline)}\n  .pillar-num{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--saffron-deep);letter-spacing:0.5px}\n  .pillar .h3{margin:14px 0 12px}\n  .pillar p{font-family:var(--serif);font-size:17px;line-height:1.5;color:var(--ink-mute);margin:0}\n  @media (max-width:780px){.pillars{grid-template-columns:1fr;gap:20px}}\n\n  /* ────────── Counter showcase ────────── */\n  .counter-show{background:var(--paper-warm);margin:0 -100vw;padding:120px 100vw;position:relative;overflow:hidden}\n  .counter-show .inner{max-width:1280px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}\n  .counter-show-text .h2{margin:18px 0 24px}\n  .counter-show-text .lead{max-width:480px;margin-bottom:32px}\n  .counter-bullets{margin:0;padding:0;list-style:none}\n  .counter-bullets li{display:flex;gap:14px;padding:14px 0;border-bottom:0.5px solid var(--hairline-2);align-items:flex-start}\n  .counter-bullets li:last-child{border-bottom:0}\n  .counter-bullets .num{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--saffron-deep);min-width:24px;font-weight:500;padding-top:2px}\n  .counter-bullets strong{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--ink);display:block;margin-bottom:2px}\n  .counter-bullets span{font-size:14px;color:var(--ink-mute);font-family:var(--serif)}\n\n  .counter-vis{position:relative;display:flex;justify-content:center;align-items:center;min-height:520px}\n  .counter-ring{position:relative;width:380px;height:380px;display:flex;align-items:center;justify-content:center}\n  .counter-ring svg{position:absolute;inset:0;width:100%;height:100%}\n  .counter-center{text-align:center;position:relative;z-index:2}\n  .counter-mantra{font-family:var(--deva);font-size:19px;color:var(--ink-soft);font-weight:500;margin-bottom:14px}\n  .counter-num{font-family:var(--serif);font-size:124px;line-height:1;font-weight:500;color:var(--ink);letter-spacing:-3px;font-variant-numeric:tabular-nums}\n  .counter-goal{margin-top:14px;font-size:12px;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink-mute);font-weight:600}\n  .counter-chip{display:inline-flex;margin-top:18px;padding:5px 12px;border-radius:999px;background:var(--saffron-soft);color:var(--saffron-deep);font-size:11px;font-weight:600;letter-spacing:0.5px}\n\n  @media (max-width:980px){\n    .counter-show{padding:80px 24px}\n    .counter-show .inner{grid-template-columns:1fr;gap:50px;padding:0}\n    .counter-ring{width:300px;height:300px}\n    .counter-num{font-size:96px}\n  }\n\n  /* ────────── Sampradayas ────────── */\n  .samp-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:48px}\n  .samp{position:relative;border-radius:18px;overflow:hidden;background:var(--card);border:0.5px solid var(--hairline);aspect-ratio:3/4;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;color:#fff;transition:transform .25s}\n  .samp:hover{transform:translateY(-4px)}\n  .samp::before{content:'';position:absolute;inset:0;z-index:0}\n  .samp::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(0,0,0,0.65) 100%);z-index:1}\n  .samp.s1::before{background:linear-gradient(180deg,#5D7BB5 0%,#1F3A6B 60%,#0E1F3D 100%)}\n  .samp.s2::before{background:linear-gradient(180deg,#E8A26A 0%,#C75A1A 60%,#7A2E0A 100%)}\n  .samp.s3::before{background:linear-gradient(180deg,#6F8A5E 0%,#3F5A35 60%,#1F2E1A 100%)}\n  .samp.s4::before{background:linear-gradient(180deg,#F4DCC4 0%,#E5A26A 60%,#C75A1A 100%)}\n  .samp .name{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:0.3px;position:relative;z-index:2}\n  .samp .sub{font-size:12px;opacity:.85;margin-top:4px;position:relative;z-index:2}\n  .samp-motif{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.25;z-index:1}\n  .samp-motif svg{width:60%}\n  @media (max-width:780px){.samp-strip{grid-template-columns:repeat(2,1fr)}}\n\n  /* ────────── GuruDev ────────── */\n  .gurudev{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;margin-top:48px}\n  .chat-mock{padding:32px;border-radius:24px;background:var(--card);border:0.5px solid var(--hairline);box-shadow:0 30px 60px rgba(26,20,16,0.06)}\n  .msg{display:flex;gap:12px;margin-bottom:18px}\n  .msg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#5D7BB5,#1F3A6B);display:flex;align-items:center;justify-content:center}\n  .msg-bubble{padding:14px 18px;border-radius:18px;font-family:var(--serif);font-size:17px;line-height:1.5;color:var(--ink-soft)}\n  .msg.user{flex-direction:row-reverse}\n  .msg.user .msg-bubble{background:var(--ink);color:var(--paper);border-bottom-right-radius:4px;font-family:var(--sans);font-size:15px}\n  .msg.user .msg-avatar{background:linear-gradient(135deg,var(--saffron),var(--krishna));color:#fff;font-family:var(--serif);font-size:14px}\n  .msg.guru .msg-bubble{background:var(--card-soft);border:0.5px solid var(--hairline);border-bottom-left-radius:4px}\n  .citation{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:5px 10px;border-radius:999px;background:var(--saffron-soft);color:var(--saffron-deep);font-size:11px;font-weight:600;font-family:var(--sans)}\n  @media (max-width:980px){.gurudev{grid-template-columns:1fr;gap:40px}}\n\n  /* ────────── Testimonial ────────── */\n  .testimonial{text-align:center;padding:80px 32px}\n  .testimonial-quote{font-family:var(--serif);font-style:italic;font-size:clamp(28px,4vw,46px);line-height:1.25;font-weight:400;color:var(--ink);max-width:900px;margin:0 auto;text-wrap:balance;letter-spacing:0.2px}\n  .testimonial-quote::before,.testimonial-quote::after{display:block;content:'';width:32px;height:1px;background:var(--saffron);margin:24px auto;opacity:.7}\n  .testimonial-attr{font-family:var(--sans);font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-mute);font-weight:600;font-style:normal}\n\n  /* ────────── CTA ────────── */\n  .cta{margin:0 -100vw;padding:140px 100vw;background:var(--ink);color:var(--paper);text-align:center;position:relative;overflow:hidden}\n  .cta-inner{max-width:760px;margin:0 auto;padding:0 32px;position:relative;z-index:2}\n  .cta .h1{color:var(--paper)}\n  .cta .h1 em{color:#E8A26A}\n  .cta .lead{color:rgba(244,236,221,0.75);margin:24px auto 40px;max-width:560px}\n  .stores{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}\n  .store{display:inline-flex;align-items:center;gap:12px;padding:14px 22px;border-radius:14px;background:var(--paper);color:var(--ink);transition:transform .15s,background .15s}\n  .store:hover{transform:tr s=\"lead\" style=\"margin-top:24px;max-width:480px\">Each morning, a verse arrives. In Devanagari, in your language, in the voice of a saint. Sit with it once — then again at dusk.<\u002Fp>\n      <div style=\"margin-top:36px;display:flex;flex-direction:column;gap:14px\">\n        <div style=\"display:flex;gap:14px;align-items:flex-start\">\n          <div style=\"font-family:var(--serif);font-style:italic;color:var(--saffron-deep);font-size:14px;min-width:24px;padding-top:2px\">i.<\u002Fdiv>\n          <div><strong style=\"font-family:var(--serif);font-size:17px;font-weight:600\">Devanagari, transliteration, translation.<\u002Fstrong><br><span style=\"font-family:var(--serif);font-size:15px;color:var(--ink-mute)\">Every verse, read three ways.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start\">\n          <div style=\"font-family:var(--serif);font-style:italic;color:var(--saffron-deep);font-size:14px;min-width:24px;padding-top:2px\">ii.<\u002Fdiv>\n          <div><strong style=\"font-family:var(--serif);font-size:17px;font-weight:600\">Saints' commentaries.<\u002Fstrong><br><span style=\"font-family:var(--serif);font-size:15px;color:var(--ink-mute)\">Hear Prabhupāda, Rāmānuja, Śaṅkara on the same śloka.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start\">\n          <div style=\"font-family:var(--serif);font-style:italic;color:var(--saffron-deep);font-size:14px;min-width:24px;padding-top:2px\">iii.<\u002Fdiv>\n          <div><strong style=\"font-family:var(--serif);font-size:17px;font-weight:600\">Word-by-word.<\u002Fstrong><br><span style=\"font-family:var(--serif);font-size:15px;color:var(--ink-mute)\">Tap any pada for the Sanskrit root.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"verse-card\">\n      <svg class=\"ornament\" viewBox=\"0 0 200 200\" fill=\"none\">\n        <g transform=\"tr v>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────────────── PILLARS ─────────────────────────────── -->\n<section class=\"section tight fade\">\n  <div class=\"eyebrow\">Three pillars<\u002Fdiv>\n  <h2 class=\"h2\" style=\"margin-top:18px;max-width:760px\">Everything a practice needs.<br>Nothing it doesn't.<\u002Fh2>\n  <div class=\"pillars\">\n    <div class=\"pillar\">\n      <div class=\"pillar-num\">i.<\u002Fdiv>\n      <h3 class=\"h3\">Scripture, accessible.<\u002Fh3>\n      <p>The Gītā, Bhāgavatam, Upaniṣads and Rāmāyaṇa — verse by verse, in ten languages, with commentaries from every major sampradāya.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pillar\">\n      <div class=\"pillar-num\">ii.<\u002Fdiv>\n      <h3 class=\"h3\">A mālā in your pocket.<\u002Fh3>\n      <p>Tap to count, hold to pause. 108 beads, full-screen, with haptic feedback. Streaks if you want them, silence if you don't.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pillar\">\n      <div class=\"pillar-num\">iii.<\u002Fdiv>\n      <h3 class=\"h3\">A patient guide.<\u002Fh3>\n      <p>GuruDev answers questions from scripture in the voice of your chosen tradition — and always cites the verse.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"ornament-line\" style=\"max-width:1280px;margin:0 auto\">\n  <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z\" fill=\"currentColor\"><\u002Fpath><\u002Fsvg>\n<\u002Fdiv>\n\n<!-- ─────────────────────────────── CHANT COUNTER ─────────────────────────────── -->\n<section class=\"counter-show fade\" id=\"chant\">\n  <div class=\"inner\">\n    <div class=\"counter-show-text\">\n      <div class=\"eyebrow\">The mālā<\u002Fdiv>\n      <h2 class=\"h2\">108 beads.<br>One bead at a time.<\u002Fh2>\n      <p class=\"lead\">Full-screen. No notifications. Tap anywhere — a soft pulse of haptic confirms each bead. The rest is silence.<\u002Fp>\n      <ul class=\"counter-bullets\">\n        <li><div class=\"num\">01<\u002Fdiv><div><strong>Tap to count.<\u002Fstrong><span>Anywhere on the screen. Hold for menu.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <li><div class=\"num\">02<\u002Fdiv><div><strong>Set a goal, or don't.<\u002Fstrong><span>16 rounds a day, four, or just sit.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <li><div class=\"num\">03<\u002Fdiv><div><strong>Three modes.<\u002Fstrong><span>Mālā ring, numeral, or a breathing circle.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <li><div class=\"num\">04<\u002Fdiv><div><strong>Streaks, optionally.<\u002Fstrong><span>You can hide them entirely in settings.<\u002Fspan><\u002Fdiv><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"counter-vis\">\n      <div class=\"counter-ring\">\n        <svg viewBox=\"0 0 380 380\" aria-hidden=\"true\">\n          <defs>\n            <radialGradient id=\"centerGlow\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n              <stop offset=\"0%\" stop-color=\"#F4DCC4\" stop-opacity=\"0.6\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#F4DCC4\" stop-opacity=\"0\"><\u002Fstop>\n            <\u002FradialGradient>\n          <\u002Fdefs>\n          <circle cx=\"190\" cy=\"190\" r=\"150\" fill=\"url(#centerGlow)\"><\u002Fcircle>\n          <!-- 108 beads -->\n          <g id=\"beads\"><\u002Fg>\n        <\u002Fsvg>\n        <div class=\"counter-center\">\n          <div class=\"counter-mantra\">हरे कृष्ण<\u002Fdiv>\n          <div class=\"counter-num\" id=\"counter-num\">432<\u002Fdiv>\n          <div class=\"counter-goal\">of 1080<\u002Fdiv>\n          <div class=\"counter-chip\">ROUND 4 · 16 LEFT<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────────────── SAMPRADAYAS ─────────────────────────────── -->\n<section class=\"section fade\" id=\"traditions\">\n  <div class=\"eyebrow\">Sampradāyas<\u002Fdiv>\n  <h2 class=\"h2\" style=\"margin-top:18px;max-width:760px\">Many rivers,<br>one ocean.<\u002Fh2>\n  <p class=\"lead\" style=\"margin-top:24px;max-width:560px\">Follow the tradition that calls to you. Each unlocks its mantras, its saints' commentaries, and shapes the voice of GuruDev.<\u002Fp>\n  <div class=\"samp-strip\">\n    <div class=\"samp s1\">\n      <div class=\"samp-motif\">\n        <svg viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"#fff\" stroke-width=\"0.8\"><g transform=\"translate(50,50)\"><circle r=\"40\"><\u002Fcircle><circle r=\"28\"><\u002Fcircle><ellipse rx=\"8\" ry=\"38\" transform=\"rotate(0)\"><\u002Fellipse><ellipse rx=\"8\" ry=\"38\" transform=\"rotate(60)\"><\u002Fellipse><ellipse rx=\"8\" ry=\"38\" transform=\"rotate(120)\"><\u002Fellipse><\u002Fg><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"name\">Gauḍīya<\u002Fdiv>\n      <div class=\"sub\">Caitanya tradition · 24K<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"samp s2\">\n      <div class=\"samp-motif\">\n        <svg viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"#fff\" stroke-width=\"0.8\"><g transform=\"translate(50,50)\"><circle r=\"22\"><\u002Fcircle><g><line y1=\"-26\" y2=\"-36\"><\u002Fline><line y1=\"-26\" y2=\"-36\" transform=\"rotate(45)\"><\u002Fline><line y1=\"-26\" y2=\"-36\" transform=\"rotate(90)\"><\u002Fline><line y1=\"-26\" y2=\"-36\" transform=\"rotate(135)\"><\u002Fline><line y1=\"-26\" y2=\"-36\" transform=\"rotate(180)\"><\u002Fline><line y1=\"-26\" y2=\"-36\" transform=\"rotate(225)\"><\u002Fline><line y1=\"-26\" y2=\"-36\" transform=\"rotate(270)\"><\u002Fline><line y1=\"-26\" y2=\"-36\" transform=\"rotate(315)\"><\u002Fline><\u002Fg><\u002Fg><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"name\">Śrī Vaiṣṇava<\u002Fdiv>\n      <div class=\"sub\">Rāmānuja · 18K<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"samp s3\">\n      <div class=\"samp-motif\">\n        <svg viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"#fff\" stroke-width=\"0.8\"><g transform=\"translate(50,55)\"><path d=\"M-18 -10 Q-26 -10 -26 0 Q-26 12 -14 12 Q-2 12 2 0\"><\u002Fpath><path d=\"M-2 -16 Q14 -22 24 -10 Q28 4 22 16\"><\u002Fpath><circle cx=\"22\" cy=\"-22\" r=\"2\" fill=\"#fff\"><\u002Fcircle><\u002Fg><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"name\">Advaita<\u002Fdiv>\n      <div class=\"sub\">Śaṅkara · 31K<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"samp s4\">\n      <div class=\"samp-motif\">\n        <svg viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"#fff\" stroke-width=\"0.8\"><g transform=\"translate(50,50)\"><circle r=\"34\"><\u002Fcircle><circle r=\"20\"><\u002Fcircle><circle r=\"6\" fill=\"#fff\" opacity=\".3\"><\u002Fcircle><\u002Fg><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"name\">Mādhva<\u002Fdiv>\n      <div class=\"sub\">Dvaita · 9K<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────────────── GURUDEV ─────────────────────────────── -->\n<section class=\"section fade\" id=\"gurudev\">\n  <div class=\"gurudev\">\n    <div>\n      <div class=\"eyebrow\">GuruDev<\u002Fdiv>\n      <h2 class=\"h2\" style=\"margin-top:18px\">Ask the question.<br>Receive the verse.<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:24px;max-width:480px\">A patient spiritual companion trained on scripture, never on opinion. Every answer carries a citation — so you can read the source yourself.<\u002Fp>\n      <ul style=\"margin-top:28px;padding:0;list-style:none;display:flex;flex-direction:column;gap:14px\">\n        <li style=\"display:flex;gap:12px;align-items:center;font-family:var(--serif);font-size:17px;color:var(--ink-soft)\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C75A1A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Speaks in your tradition's voice<\u002Fli>\n        <li style=\"display:flex;gap:12px;align-items:center;font-family:var(--serif);font-size:17px;color:var(--ink-soft)\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C75A1A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Always cites the verse, never guesses<\u002Fli>\n        <li style=\"display:flex;gap:12px;align-items:center;font-family:var(--serif);font-size:17px;color:var(--ink-soft)\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C75A1A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Defers on medical, legal &amp; personal matters<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"chat-mock\">\n      <div class=\"msg user\">\n        <div class=\"msg-avatar\">R<\u002Fdiv>\n        <div class=\"msg-bubble\">How do I work without becoming attached to outcomes?<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"msg guru\">\n        <div class=\"msg-avatar\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.5\"><path d=\"M8 9c-2 0-3 2-3 4s1 4 3 4c2 0 3-2 4-4M12 13c1-2 3-4 5-4s3 2 3 4-1 4-3 4M16 6c0-1 1-2 2-2\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div class=\"msg-bubble\">The Gītā answers this directly in the second chapter. Kṛṣṇa tells Arjuna that effort is yours, but the fruit is not. Act with full attention — and let the result rest with the Divine.<\u002Fdiv>\n          <span class=\"citation\">\n            <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 5a2 2 0 012-2h13v17H6a2 2 0 00-2 2V5z\"><\u002Fpath><\u002Fsvg>\n            Bhagavad Gītā · 2.47\n          <\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────────────── TESTIMONIAL ─────────────────────────────── -->\n<section class=\"testimonial fade\">\n  <blockquote class=\"testimonial-quote\">\n    \"I have tried a dozen meditation apps. This is the first that feels like it was made by someone who actually chants.\"\n  <\u002Fblockquote>\n  <div class=\"testimonial-attr\">— Anand R. · ★★★★★ · App Store<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────────────── CTA ─────────────────────────────── -->\n<section class=\"cta\" id=\"download\">\n  <svg class=\"cta-bg\" viewBox=\"0 0 1000 600\" aria-hidden=\"true\" preserveAspectRatio=\"xMidYMid slice\">\n    <g transform=\"translate(500,300)\" stroke=\"#E8A26A\" fill=\"none\" stroke-width=\"0.4\">\n      <circle r=\"120\"><\u002Fcircle><circle r=\"180\"><\u002Fcircle><circle r=\"240\"><\u002Fcircle><circle r=\"300\"><\u002Fcircle>\n      <g><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60)\"><\u002Fellipse><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60) rotate(40)\"><\u002Fellipse><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60) rotate(80)\"><\u002Fellipse><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60) rotate(120)\"><\u002Fellipse><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60) rotate(160)\"><\u002Fellipse><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60) rotate(200)\"><\u002Fellipse><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60) rotate(240)\"><\u002Fellipse><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60) rotate(280)\"><\u002Fellipse><ellipse rx=\"20\" ry=\"100\" transform=\"translate(0,-60) rotate(320)\"><\u002Fellipse><\u002Fg>\n    <\u002Fg>\n  <\u002Fsvg>\n  <div class=\"cta-inner\">\n    <div class=\"eyebrow\" style=\"color:#E8A26A\">हरि हरि बोल<\u002Fdiv>\n    <h2 class=\"h1\" style=\"margin-top:18px\">A practice that <em>begins<\u002Fem><br>the moment you open it.<\u002Fh2>\n    <p class=\"lead\">Free. No ads. No streak shaming. Just the verses, the mālā, and time well spent.<\u002Fp>\n    <div class=\"stores\">\n      <a href=\"#\" class=\"store\">\n        <svg width=\"22\" height=\"26\" viewBox=\"0 0 18 22\" fill=\"currentColor\"><path d=\"M14.7 11.7c0-2.7 2.2-4 2.3-4-1.3-1.8-3.2-2.1-3.9-2.1-1.7-.2-3.2 1-4.1 1-.9 0-2.2-1-3.6-1-1.8 0-3.6 1.1-4.5 2.7C-.9 11.5.4 16.2 2.2 18.8c.9 1.3 1.9 2.7 3.3 2.6 1.3-.1 1.8-.9 3.4-.9s2.1.9 3.5.8c1.4 0 2.4-1.3 3.3-2.5 1-1.5 1.4-2.9 1.5-3-.1 0-2.5-.9-2.5-3.5zM12 3.6c.7-.8 1.2-2 1.1-3.2-1 .1-2.3.7-3 1.5-.7.7-1.3 2-1.1 3.1 1.1.1 2.3-.6 3-1.4z\"><\u002Fpath><\u002Fsvg>\n        <div><div class=\"top\">Download on the<\u002Fdiv><div class=\"name\">App Store<\u002Fdiv><\u002Fdiv>\n      <\u002Fa>\n      <a href=\"#\" class=\"store\">\n        <svg width=\"22\" height=\"26\" viewBox=\"0 0 24 24\"><path fill=\"#34A853\" d=\"M3 20.5V3.5c0-.3.1-.5.3-.7l9.7 9.2-9.7 9.2c-.2-.2-.3-.4-.3-.7z\"><\u002Fpath><path fill=\"#FBBC04\" d=\"M13 12l3.4-3.2 2.9 1.6c1 .6 1 1.6 0 2.2l-2.9 1.6L13 12z\"><\u002Fpath><path fill=\"#EA4335\" d=\"M13 12l-9.7 9.2c.3.3.8.4 1.3.1l12-6.7L13 12z\"><\u002Fpath><path fill=\"#4285F4\" d=\"M13 12l3.6-3.4-12-6.7c-.5-.3-1-.2-1.3.1L13 12z\"><\u002Fpath><\u002Fsvg>\n        <div><div class=\"top\">Get it on<\u002Fdiv><div class=\"name\">Google Play<\u002Fdiv><\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────────────────── FOOTER ─────────────────────────────── -->\n<footer>\n  <div class=\"foot\">\n    <div class=\"foot-brand\">\n      <a href=\"#\" class=\"logo\">\n        <svg class=\"logo-mark\" viewBox=\"0 0 48 48\" fill=\"none\"><g stroke=\"#C75A1A\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.95\"><path d=\"M24 32c-7 0-12-5-12-11 4 0 7 2 8 5M24 32c7 0 12-5 12-11-4 0-7 2-8 5\"><\u002Fpath><path d=\"M24 32c-5-1-9-5-9-12 3 1 6 4 7 8M24 32c5-1 9-5 9-12-3 1-6 4-7 8\"><\u002Fpath><path d=\"M24 32V18c2 3 3 7 3 14M24 32V18c-2 3-3 7-3 14\"><\u002Fpath><ellipse cx=\"24\" cy=\"33\" rx=\"14\" ry=\"2.5\"><\u002Fellipse><\u002Fg><\u002Fsvg>\n        <span class=\"logo-name\">HariHariBol<\u002Fspan>\n      <\u002Fa>\n      <p>A quiet place to chant. Made with reverence, in service of the practice — never of the algorithm.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h4>Practice<\u002Fh4>\n      <ul>\n        <li><a href=\"#verse\">Daily verse<\u002Fa><\u002Fli>\n        <li><a href=\"#chant\">Chant counter<\u002Fa><\u002Fli>\n        <li><a href=\"#gurudev\">GuruDev<\u002Fa><\u002Fli>\n        <li><a href=\"#traditions\">Traditions<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <h4>About<\u002Fh4>\n      <ul>\n        <li><a href=\"#\">Our mission<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Editorial<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Press kit<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Contact<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <h4>Resources<\u002Fh4>\n      <ul>\n        <li><a href=\"#\">FAQ<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Privacy<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Terms<\u002Fa><\u002Fli>\n        <li><a href=\"#\">हिन्दी / English<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot-bottom\">\n    <span>© 2026 HariHariBol · Made with reverence in Vrindavan &amp; Bangalore<\u002Fspan>\n    <span class=\"om\">ॐ शान्तिः शान्तिः शान्तिः<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // ─── 108 beads on the counter ring ────────────────────────────\n  (function(){\n    const g = document.getElementById('beads');\n    if(!g) return;\n    const cx=190, cy=190, r=150, total=108, count=43;\n    for(let i=0;i<total;i++){\n      const a = (i/total)*Math.PI*2 - Math.PI/2;\n      const x = cx + Math.cos(a)*r, y = cy + Math.sin(a)*r;\n      const filled = i < count;\n      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');\n      c.setAttribute('cx', x); c.setAttribute('cy', y);\n      c.setAttribute('r', i===0 ? 5 : 3.4);\n      c.setAttribute('fill', filled ? '#C75A1A' : 'rgba(26,20,16,0.13)');\n      g.appendChild(c);\n      if(filled){\n        const sh = document.createElementNS('http://www.w3.org/2000/svg','circle');\n        sh.setAttribute('cx', x - 0.8); sh.setAttribute('cy', y - 0.8);\n        sh.setAttribute('r', 1.4); sh.setAttribute('fill', 'rgba(255,255,255,0.55)');\n        g.appendChild(sh);\n      }\n    }\n    // sumeru\n    const su = document.createElementNS('http://www.w3.org/2000/svg','circle');\n    su.setAttribute('cx', cx); su.setAttribute('cy', cy - r);\n    su.setAttribute('r', 6); su.setAttribute('fill', '#9F4314');\n    g.appendChild(su);\n  })();\n\n  // ─── count up ─────────────────────────────────────────────────\n  (function(){\n    const el = document.getElementById('counter-num');\n    if(!el) return;\n    const target = 432;\n    let cur = 0;\n    const io = new IntersectionObserver(es => {\n      es.forEach(e=>{\n        if(e.isIntersecting && cur < target){\n          const step = () => {\n            cur = Math.min(target, cur + Math.ceil((target - cur)/14));\n            el.textContent = cur;\n            if(cur < target) requestAnimationFrame(step);\n          };\n          step();\n          io.disconnect();\n        }\n      });\n    },{threshold:.3});\n    io.observe(el);\n  })();\n\n  // ─── fade-in on scroll ────────────────────────────────────────\n  (function(){\n    const io = new IntersectionObserver(es=>{\n      es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }});\n    },{threshold:.12});\n    document.querySelectorAll('.fade').forEach(el=>io.observe(el));\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
