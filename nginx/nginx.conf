events {
  worker_connections 1024;
}

http {
  # ── Upstreams ───────────────────────────────────────────────────────────────
  upstream backend  { server backend:3000; }
  upstream webapp   { server webapp:3000;  }
  upstream website  { server website:3000; }
  upstream admin    { server admin:3009;   }

  # ── Common proxy headers ────────────────────────────────────────────────────
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 60s;

  # ── API  →  api.hariharibol.com ─────────────────────────────────────────────
  server {
    listen 80;
    server_name api.hariharibol.com;

    location / {
      proxy_pass http://backend;
    }
  }

  # ── Web App  →  app.hariharibol.com ─────────────────────────────────────────
  server {
    listen 80;
    server_name app.hariharibol.com;

    location / {
      proxy_pass http://webapp;
    }
  }

  # ── Marketing site  →  hariharibol.com ──────────────────────────────────────
  server {
    listen 80;
    server_name hariharibol.com www.hariharibol.com;

    location / {
      proxy_pass http://website;
    }
  }

  # ── Admin Panel  →  admin.hariharibol.com ───────────────────────────────────
  server {
    listen 80;
    server_name admin.hariharibol.com;

    location / {
      proxy_pass http://admin;
    }
  }
}
